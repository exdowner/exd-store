<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACKING | EXD STORE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container { width: 100%; max-width: 500px; padding: 30px; background: rgba(5,5,5,0.9); border: 1px solid rgba(255,255,255,0.1); }
        
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 1.5rem; }
        h2 span { color: #00ff88; }

        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 15px; background: #000; border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: #00ff88; }
        
        .btn-search { padding: 0 25px; background: #fff; color: #000; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-search:hover { background: #00ff88; }

        .result-zone { display: none; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 25px; }
        
        .status-banner { padding: 15px; text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-size: 0.9rem; }
        .status-banner.waiting { background: rgba(255,255,255,0.05); border: 1px solid #fff; color: #fff; }
        .status-banner.approved { background: rgba(0,255,136,0.05); border: 1px solid #00ff88; color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.1); }

        .info-row { margin-bottom: 15px; background: rgba(255,255,255,0.02); padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .info-row label { display: block; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .info-row p { font-size: 1rem; word-break: break-all; }

        .btn-download { display: block; width: 100%; text-align: center; padding: 15px; background: #00ff88; color: #000; font-weight: bold; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
        .btn-download:hover { background: #fff; }
        
        .back-link { display: block; text-align: center; margin-top: 25px; color: #444; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Rastrear <span>Pedido</span></h2>
        
        <div class="search-box">
            <input type="text" id="searchId" placeholder="EXD-XXXXX">
            <button class="btn-search" id="searchBtn">Buscar</button>
        </div>

        <div class="result-zone" id="resultZone">
            <div class="status-banner" id="statusBanner">AGUARDANDO PAGAMENTO</div>
            
            <div class="info-row">
                <label>Produto Adquirido</label>
                <p id="prodLabel">-</p>
            </div>

            <div class="info-row">
                <label>Comprador (Discord)</label>
                <p id="discordLabel">-</p>
            </div>

            <div id="deliveryZone" style="display: none;">
                <div class="info-row" style="border-color: #00ff88;">
                    <label style="color:#00ff88;">Sua Chave de Ativação (Key)</label>
                    <p id="keyLabel" style="font-family: monospace; font-weight: bold;">-</p>
                </div>
                <a href="#" id="dlLink" target="_blank" class="btn-download">Baixar Executável</a>
            </div>
        </div>

        <a href="index.html" class="back-link">Voltar para a Loja</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_AUTH_DOMAIN",
            databaseURL: "SUA_DATABASE_URL",
            projectId: "SEU_PROJECT_ID",
            storageBucket: "SEU_STORAGE_BUCKET",
            messagingSenderId: "SEU_MESSAGING_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentActiveRef = null;

        document.getElementById('searchBtn').addEventListener('click', () => {
            const searchId = document.getElementById('searchId').value.trim();
            if(!searchId) { alert('Digite um ID válido.'); return; }

            // Limpa escuta anterior se houver para não duplicar consumo
            if(currentActiveRef) { currentActiveRef(); }

            const pedidoRef = ref(db, 'pedidos/' + searchId);
            
            // O onValue mantém atualizações automáticas reativas na tela do cliente
            currentActiveRef = onValue(pedidoRef, (snapshot) => {
                const data = snapshot.val();
                
                if(!data) {
                    alert('ID de pedido não encontrado no sistema.');
                    document.getElementById('resultZone').style.display = 'none';
                    return;
                }

                document.getElementById('resultZone').style.display = 'block';
                document.getElementById('prodLabel').innerText = data.produto;
                document.getElementById('discordLabel').innerText = data.discord;

                if(data.status === 'aprovado') {
                    document.getElementById('statusBanner').innerText = "PRODUTO LIBERADO";
                    document.getElementById('statusBanner').className = "status-banner approved";
                    document.getElementById('keyLabel').innerText = data.key;
                    document.getElementById('dlLink').href = data.download;
                    document.getElementById('deliveryZone').style.display = 'block';
                } else {
                    document.getElementById('statusBanner').innerText = "AGUARDANDO VERIFICAÇÃO";
                    document.getElementById('statusBanner').className = "status-banner waiting";
                    document.getElementById('deliveryZone').style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
