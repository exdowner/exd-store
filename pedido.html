<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE RASTREAMENTO | EXD STORE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: #000000; color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container { width: 100%; max-width: 500px; padding: 35px; background: #000000; border: 1px solid rgba(255,255,255,0.2); }
        
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 1.4rem; }
        h2 span { color: #000000; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; }

        .search-box { display: flex; gap: 10px; margin-bottom: 35px; }
        input { flex: 1; padding: 15px; background: #000000; border: 1px solid rgba(255,255,255,0.3); color: #ffffff; font-size: 1rem; outline: none; border-radius: 0px; }
        input:focus { border-color: #ffffff; }
        
        .btn-search { padding: 0 25px; background: #ffffff; color: #000000; border: 1px solid #ffffff; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-search:hover { background: #000000; color: #ffffff; }

        .result-zone { display: none; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 30px; }
        
        .status-banner { padding: 15px; text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-size: 0.85rem; border: 1px solid #ffffff; }
        .status-banner.waiting { background: #000000; color: #ffffff; }
        .status-banner.approved { background: #ffffff; color: #000000; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .info-row { margin-bottom: 15px; background: rgba(255,255,255,0.02); padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .info-row label { display: block; font-size: 0.7rem; color: #ffffff; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .info-row p { font-size: 1rem; word-break: break-all; }

        .btn-download { display: block; width: 100%; text-align: center; padding: 16px; background: #ffffff; color: #000000; font-weight: bold; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; margin-top: 25px; border: 1px solid #ffffff; }
        .btn-download:hover { background: #000000; color: #ffffff; }
        
        .back-link { display: block; text-align: center; margin-top: 30px; color: #ffffff; opacity: 0.4; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Rastreamento <span>EXD</span></h2>
        
        <div class="search-box">
            <input type="text" id="searchId" placeholder="Insira o ID (EXD-XXXXX)">
            <button class="btn-search" id="searchBtn">Verificar</button>
        </div>

        <div class="result-zone" id="resultZone">
            <div class="status-banner" id="statusBanner">VERIFICANDO</div>
            
            <div class="info-row">
                <label>Item</label>
                <p id="prodLabel">-</p>
            </div>

            <div class="info-row">
                <label>Discord Vinculado</label>
                <p id="discordLabel">-</p>
            </div>

            <div id="deliveryZone" style="display: none;">
                <div class="info-row" style="border-color: #ffffff;">
                    <label style="opacity: 1;">Sua Licença Privada (Key)</label>
                    <p id="keyLabel" style="font-family: monospace; font-weight: bold; letter-spacing: 1px;">-</p>
                </div>
                <a href="#" id="dlLink" target="_blank" class="btn-download">Efetuar Download</a>
            </div>
        </div>

        <a href="index.html" class="back-link">Voltar para a vitrine</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsDeOjhkkKtXK8kBpuVORQ1FTI_EdBTdU",
            authDomain: "pobrecraft-c517c.firebaseapp.com",
            databaseURL: "https://pobrecraft-c517c-default-rtdb.firebaseio.com",
            projectId: "pobrecraft-c517c",
            storageBucket: "pobrecraft-c517c.firebasestorage.app",
            messagingSenderId: "906438912132",
            appId: "1:906438912132:web:a3d9827600d3c0a52dbad1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentActiveRef = null;

        document.getElementById('searchBtn').addEventListener('click', () => {
            const searchId = document.getElementById('searchId').value.trim();
            if(!searchId) { alert('Digite seu ID.'); return; }

            if(currentActiveRef) { currentActiveRef(); }

            currentActiveRef = onValue(ref(db, 'pedidos/' + searchId), (snapshot) => {
                const data = snapshot.val();
                if(!data) { alert('Pedido inexistente.'); document.getElementById('resultZone').style.display = 'none'; return; }

                document.getElementById('resultZone').style.display = 'block';
                document.getElementById('prodLabel').innerText = data.produto;
                document.getElementById('discordLabel').innerText = data.discord;

                if(data.status === 'aprovado') {
                    document.getElementById('statusBanner').innerText = "PEDIDO CONCLUÍDO";
                    document.getElementById('statusBanner').className = "status-banner approved";
                    document.getElementById('keyLabel').innerText = data.key;
                    document.getElementById('dlLink').href = data.download;
                    document.getElementById('deliveryZone').style.display = 'block';
                } else {
                    document.getElementById('statusBanner').innerText = "AGUARDANDO APROVAÇÃO FINANCEIRA";
                    document.getElementById('statusBanner').className = "status-banner waiting";
                    document.getElementById('deliveryZone').style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
