<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXD STORE | EXD CORPORATION</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: #000000; color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; position: relative; }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.2; pointer-events: none; }
        
        .container { width: 100%; max-width: 440px; padding: 40px 30px; background: #000000; border: 1px solid #ffffff; box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); position: relative; z-index: 2; }
        
        h1 { font-size: 2.6rem; text-align: center; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 5px; font-weight: 900; }
        h1 span { color: #000000; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; }
        .subtitle { text-align: center; font-size: 0.75rem; letter-spacing: 3px; color: #ffffff; opacity: 0.5; margin-bottom: 40px; text-transform: uppercase; }

        .product-card { border: 1px solid rgba(255,255,255,0.1); padding: 30px 20px; background: rgba(255,255,255,0.02); text-align: center; margin-bottom: 25px; transition: 0.3s; }
        .product-card:hover { border-color: #ffffff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
        .product-title { font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; }
        .price { font-size: 2rem; color: #ffffff; font-weight: 900; margin-bottom: 25px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #ffffff; opacity: 0.6; margin-bottom: 10px; font-weight: 700; }
        input { width: 100%; padding: 15px; background: #000000; border: 1px solid rgba(255,255,255,0.2); color: #ffffff; font-size: 1rem; outline: none; transition: 0.3s; border-radius: 0px; }
        input:focus { border-color: #ffffff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

        .btn { width: 100%; padding: 18px; background: #ffffff; color: #000000; border: 1px solid #ffffff; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #000000; color: #ffffff; box-shadow: 0 0 25px rgba(255,255,255,0.5); transform: translateY(-2px); }

        .nav-link { display: block; text-align: center; margin-top: 20px; color: #ffffff; opacity: 0.4; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; font-weight: 600; }
        .nav-link:hover { color: #ffffff; opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #000000; border: 1px solid #ffffff; padding: 40px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 0 40px rgba(255,255,255,0.2); }
        .order-id { font-size: 1.8rem; color: #ffffff; font-weight: 900; margin: 25px 0; letter-spacing: 3px; border: 1px dashed #ffffff; padding: 12px; background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <h1>EXD <span>STORE</span></h1>
        <div class="subtitle">EXD CORPORATION</div>

        <div class="product-card">
            <div class="product-title">EXD PAINEL</div>
            <div class="price">ADQUIRIR</div>
            
            <div class="input-group">
                <label>Seu ID do Discord</label>
                <input type="text" id="discordInput" placeholder="Ex: lcz.exd">
            </div>
            
            <button class="btn" id="buyBtn">Gerar Pedido</button>
        </div>

        <a href="pedido.html" class="nav-link">Rastrear Pedido Existente</a>
        <a href="https://discord.gg/dnNJ6ANP3J" target="_blank" class="nav-link" style="opacity: 1; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">Entrar no Discord</a>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h3 style="text-transform: uppercase; letter-spacing: 2px;">Pedido Registrado</h3>
            <p style="color:#fff; opacity:0.6; font-size:0.9rem; margin-top:10px;">Copie o ID abaixo para acompanhar a liberação da sua chave.</p>
            <div class="order-id" id="displayId">EXD-XXXXX</div>
            <button class="btn" onclick="window.location.href='pedido.html'">Acompanhar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsDeOjhkkKtXK8kBpuVORQ1FTI_EdBTdU",
            authDomain: "pobrecraft-c517c.firebaseapp.com",
            databaseURL: "https://pobrecraft-c517c-default-rtdb.firebaseio.com",
            projectId: "pobrecraft-c517c",
            storageBucket: "pobrecraft-c517c.firebasestorage.app",
            messagingSenderId: "906438912132",
            appId: "1:906438912132:web:a3d9827600d3c0a52dbad1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function generateUniqueId() {
            return `EXD-${Math.floor(10000 + Math.random() * 90000)}`;
        }

        document.getElementById('buyBtn').addEventListener('click', async () => {
            const discordUser = document.getElementById('discordInput').value.trim();
            if(!discordUser) { alert('Insira seu Discord ID.'); return; }

            const orderId = generateUniqueId();
            const dateStr = new Date().toLocaleString('pt-BR');

            try {
                await set(ref(db, 'pedidos/' + orderId), {
                    id: orderId,
                    discord: discordUser,
                    produto: "EXD PAINEL",
                    status: "aguardando",
                    key: "",
                    download: "",
                    data: dateStr
                });
                document.getElementById('displayId').innerText = orderId;
                document.getElementById('resultModal').style.display = 'flex';
            } catch(error) {
                console.error(error);
                alert('Erro na conexão.');
            }
        });
    </script>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class P {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.vx = (Math.random()-0.5)*0.3; this.vy = (Math.random()-0.5)*0.6; }
            u() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; }
        }
        for(let i=0;i<50;i++) particles.push(new P());
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let i=0;i<particles.length;i++) {
                particles[i].u();
                for(let j=i+1;j<particles.length;j++) {
                    let dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 130) {
                        ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255,255,255,${0.15 * (1 - dist/130)})`; ctx.lineWidth = 1; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
